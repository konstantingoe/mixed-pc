site_name: mixpc - Python package for learning causal graphical models from data with mixed variable types

repo_url: https://github.com/konstantingoe/mixed-pc
site_url: https://konstantingoe.github.io/mixed-pc/

theme:
  name: material
  highlightjs: true
  color_mode: auto
  hljs_languages:
    - python
  include_sidebar: true
  features:
    - navigation.expand
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview

extra:
  version:
    default: latest
    provider: mike

plugins:
  - mkdocstrings:
      enable_inventory: true
  - search
  - mike:
      canonical_version: latest

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - codehilite:
      guess_lang: false

nav:
  - index.md
  - reference.md
