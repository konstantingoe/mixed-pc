name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff mypy types-requests

      - name: ruff
        run: ruff check mixpc/ tests/

      - name: mypy
        run: mypy mixpc/ --strict --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install numpy scipy pandas networkx scikit-learn matplotlib
          pip install pytest pytest-cov
          pip install causallearn

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_benchmark_causallearn.py

      - name: Run benchmark tests
        run: pytest tests/test_benchmark_causallearn.py -v --tb=short

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: pip install mkdocs mkdocs-material mkdocstrings[python] mike

      - name: Build docs
        run: mkdocs build --strict
