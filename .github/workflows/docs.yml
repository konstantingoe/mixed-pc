name: Deploy docs

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed by mike

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: pip install mkdocs mkdocs-material mkdocstrings[python] mike

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mike deploy --push --update-aliases "$VERSION" latest

      - name: Deploy dev docs (main push)
        if: github.ref == 'refs/heads/main'
        run: mike deploy --push --update-aliases dev

      - name: Set default version (first deploy only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: mike set-default --push latest
