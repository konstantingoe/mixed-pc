name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: twine check --strict dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only stable tags reach PyPI. Prereleases (rc/alpha/beta/dev) build but
    # don't publish — use TestPyPI for those. PEP 440 short forms (a1, b1)
    # are not covered; spell prereleases out in tag names (e.g. v0.1.0rc1).
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref_name, 'rc') &&
      !contains(github.ref_name, 'alpha') &&
      !contains(github.ref_name, 'beta') &&
      !contains(github.ref_name, 'dev')
    environment:
      name: pypi
      url: https://pypi.org/p/mixpc
    permissions:
      id-token: write   # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
